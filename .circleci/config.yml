version: 2.1

executors:
  deploy-executor:
    docker:
      - image: cimg/base:stable

commands:
  install-rsync:
    description: "Install rsync if not already installed"
    steps:
      - run:
          name: Install rsync
          command: |
            if ! command -v rsync &> /dev/null; then
              sudo apt-get update
              sudo apt-get install -y rsync
            fi

  clean-disk-space:
    description: "Free disk space on remote server"
    steps:
      - run:
          name: Clean remote disk
          command: |
            # Do NOT use `docker image prune -af` — it deletes tagged images like hrms-py:prod
            # between build-prod and deploy-prod when no container is holding them yet.
            ssh -o StrictHostKeyChecking=no root@147.93.18.45 "docker container prune -f || true; docker builder prune -f || true; journalctl --vacuum-time=1d || true; rm -rf /home/source/prod/hrms-py/archive/processed/* || true"

  create-remote-dir:
    description: "Create remote directory on server"
    parameters:
      environment:
        type: string
    steps:
      - run:
          name: Create remote directory
          command: |
            ssh -o StrictHostKeyChecking=no root@147.93.18.45 "mkdir -p /home/source/<< parameters.environment >>/${CIRCLE_PROJECT_REPONAME}/"

  upload-code:
    description: "Upload code to server using rsync"
    parameters:
      environment:
        type: string
    steps:
      - run:
          name: Install rsync on remote server
          command: |
            ssh -o StrictHostKeyChecking=no root@147.93.18.45 "if ! command -v rsync &> /dev/null; then apt-get update && apt-get install -y rsync; fi"
      - run:
          name: Upload code to server
          command: |
            rsync -avz -e "ssh -o StrictHostKeyChecking=no" \
              --exclude='.git' \
              --exclude='node_modules' \
              --exclude='dist' \
              --exclude='venv' \
              --exclude='.venv' \
              --exclude='__pycache__' \
              --exclude='archive/' \
              ./ root@147.93.18.45:/home/source/<< parameters.environment >>/${CIRCLE_PROJECT_REPONAME}/

  build-docker:
    description: "Build Docker image on VPS"
    parameters:
      environment:
        type: string
    steps:
      - run:
          name: Build Docker image
          command: |
            printf -v circle_project_reponame %q "${CIRCLE_PROJECT_REPONAME}"
            ssh -o StrictHostKeyChecking=no root@147.93.18.45 "bash -s $circle_project_reponame" \<< 'EOF'
              set -euo pipefail
              circle_project_reponame_var=$1
              image_tag="${circle_project_reponame_var}:<< parameters.environment >>"
              cd /home/source/<< parameters.environment >>/$circle_project_reponame_var/
              test -f Dockerfile
              docker build -t "$image_tag" -f Dockerfile .
              docker image inspect "$image_tag" >/dev/null
              echo "Built $image_tag OK"
            EOF

  setup-environment:
    description: "Setup environment variables on VPS"
    parameters:
      environment:
        type: string
    steps:
      - run:
          name: Setup ENV
          command: |
            printf -v circle_project_reponame %q "${CIRCLE_PROJECT_REPONAME}"
            ssh -o StrictHostKeyChecking=no root@147.93.18.45 "bash -s $circle_project_reponame" \<< 'EOF'
              circle_project_reponame_var=$1
              mkdir -p /home/source/<< parameters.environment >>/$circle_project_reponame_var/docker/volume/env/
              if [ -f /home/env/<< parameters.environment >>/$circle_project_reponame_var/<< parameters.environment >>.env ]; then
                cp /home/env/<< parameters.environment >>/$circle_project_reponame_var/<< parameters.environment >>.env /home/source/<< parameters.environment >>/$circle_project_reponame_var/docker/volume/env/.env
              else
                touch /home/source/<< parameters.environment >>/$circle_project_reponame_var/docker/volume/env/.env
              fi
            EOF

  deploy-docker:
    description: "Deploy Docker container"
    parameters:
      environment:
        type: string
    steps:
      - run:
          name: Deploy Docker container
          command: |
            printf -v circle_project_reponame %q "${CIRCLE_PROJECT_REPONAME}"
            ssh -o StrictHostKeyChecking=no root@147.93.18.45 "bash -s $circle_project_reponame" \<< 'EOF'
              set -euo pipefail
              circle_project_reponame_var=$1
              image_tag="${circle_project_reponame_var}:<< parameters.environment >>"
              container_name="${circle_project_reponame_var}-container"
              cd /home/source/<< parameters.environment >>/$circle_project_reponame_var/

              # Rebuild if missing so `docker run` never tries Docker Hub pull of "hrms-py"
              if ! docker image inspect "$image_tag" >/dev/null 2>&1; then
                echo "Image $image_tag missing — building on VPS..."
                docker build -t "$image_tag" -f Dockerfile .
              fi
              docker image inspect "$image_tag" >/dev/null

              docker rm -f "$container_name" 2>/dev/null || true
              docker ps -aq --filter "name=^/${container_name}$" | xargs -r docker rm -f 2>/dev/null || true
              docker run -d -p 8000:8000 --name "$container_name" --restart always "$image_tag"
              sleep 2
              curl -fsS "http://127.0.0.1:8000/health" || curl -fsS "http://127.0.0.1:8000/" || true
            EOF

  update-nginx:
    description: "Update host Nginx site config"
    parameters:
      environment:
        type: string
    steps:
      - run:
          name: Update Nginx site config
          command: |
            printf -v circle_project_reponame %q "${CIRCLE_PROJECT_REPONAME}"
            printf -v app_domain %q "hrms-py.devcognito.tech"
            ssh -o StrictHostKeyChecking=no root@147.93.18.45 "bash -s $circle_project_reponame $app_domain" \<< 'EOF'
              circle_project_reponame_var=$1
              domain=$2
              cd /home/source/<< parameters.environment >>/$circle_project_reponame_var/
              if [ -f deploy/nginx/site.conf ]; then
                sed "s/__DOMAIN__/${domain}/g" deploy/nginx/site.conf > /etc/nginx/sites-available/${circle_project_reponame_var}.conf
                ln -sf /etc/nginx/sites-available/${circle_project_reponame_var}.conf /etc/nginx/sites-enabled/${circle_project_reponame_var}.conf
                nginx -t
                systemctl reload nginx
                certbot --nginx -d ${domain} --non-interactive --agree-tos -m admin@devcognito.tech --redirect
                systemctl reload nginx
              else
                echo "Warning: deploy/nginx/site.conf not found. Skipping Nginx file overwrite to keep existing routes safe."
              fi
            EOF

jobs:
  checkout-code:
    executor: deploy-executor
    steps:
      - checkout

  upload-to-prod:
    executor: deploy-executor
    steps:
      - checkout
      - add_ssh_keys
      - clean-disk-space
      - install-rsync
      - create-remote-dir:
          environment: prod
      - upload-code:
          environment: prod

  build-prod:
    executor: deploy-executor
    steps:
      - checkout
      - add_ssh_keys
      - build-docker:
          environment: prod

  setup-environment-prod:
    executor: deploy-executor
    steps:
      - checkout
      - add_ssh_keys
      - setup-environment:
          environment: prod

  deploy-prod:
    executor: deploy-executor
    steps:
      - checkout
      - add_ssh_keys
      - deploy-docker:
          environment: prod

  update-nginx-prod:
    executor: deploy-executor
    steps:
      - checkout
      - add_ssh_keys
      - update-nginx:
          environment: prod

workflows:
  deploy-to-prod:
    jobs:
      - checkout-code:
          filters:
            branches:
              only: main
      - upload-to-prod:
          requires:
            - checkout-code
          filters:
            branches:
              only: main
      - build-prod:
          requires:
            - upload-to-prod
          filters:
            branches:
              only: main
      - setup-environment-prod:
          requires:
            - build-prod
          filters:
            branches:
              only: main
      - deploy-prod:
          requires:
            - setup-environment-prod
          filters:
            branches:
              only: main
      - update-nginx-prod:
          requires:
            - deploy-prod
          filters:
            branches:
              only: main
